<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☕ 史努比的生成式 AI 考照助手</title>
    <style>
        /* 視覺與介面風格：日系、奶茶色調 */
        :root { 
            --primary: #BCA38F; 
            --primary-dark: #8D6E63; 
            --bg: #FAF6F0; 
            --card: #FFFFFF; 
            --success: #A3B18A; 
            --error: #E07A5F; 
            --text: #5C4D43; 
            --accent: #EFE6DD; 
        }
        
        body { 
            font-family: 'Quicksand', 'Nunito', "微軟正黑體", sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text); 
            padding-bottom: 50px; 
            line-height: 1.6;
        }
        
        /* Header & 導覽列 */
        .app-header { 
            background: var(--card); 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(188, 163, 143, 0.15); 
            border-bottom: 2px solid var(--accent);
        }
        .menu-dots { background: none; border: none; color: var(--primary-dark); font-size: 24px; cursor: pointer; padding: 0 10px; }
        .snoopy-title { flex:1; text-align:center; font-weight:bold; font-size: 16px; color: var(--primary-dark); }
        .btn-clear { background: var(--accent); border: none; padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--text); cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-clear:hover { background: #e0d4c8; }
        
        /* 左上角選單 */
        .side-menu { display: none; position: absolute; top: 55px; left: 10px; background: var(--card); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 15px; width: 180px; z-index: 1001; overflow: hidden; }
        .side-menu a { display: block; padding: 12px 15px; color: var(--text); text-decoration: none; border-bottom: 1px dashed var(--accent); font-size: 14px; transition: 0.3s; font-weight: bold; }
        .side-menu a:hover { background: var(--accent); }

        /* 分頁切換 (Tabs) */
        .tab-bar { display: flex; background: var(--accent); padding: 5px; border-radius: 50px; margin: 10px 0; overflow-x: auto; white-space: nowrap; }
        .tab-btn { flex: 1; padding: 8px 12px; border: none; background: transparent; border-radius: 50px; cursor: pointer; font-size: 13px; color: var(--primary-dark); transition: 0.3s; }
        .tab-btn.active { background: var(--card); font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* 內容區塊 */
        .content-section { display: none; padding: 15px; }
        .active-sec { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(188, 163, 143, 0.1); border: 1px solid #FAF6F0; transition: all 0.3s ease; }
        
        /* 圓形進度條 */
        .circle-progress { width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(var(--primary) var(--p, 0%), var(--accent) 0); display: flex; align-items: center; justify-content: center; margin: 20px auto; position: relative; }
        .circle-progress::after { content: ""; width: 95px; height: 95px; background: var(--card); border-radius: 50%; position: absolute; }
        .progress-text { position: relative; z-index: 1; font-size: 24px; font-weight: bold; color: var(--primary-dark); }

        /* 輸入框與按鈕 */
        select, input[type="text"] { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--accent); margin: 5px 0 15px; background: var(--card); color: var(--text); outline: none; box-sizing: border-box; font-family: inherit; font-size:14px; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 10px rgba(188, 163, 143, 0.3); }
        .btn-main:active { transform: scale(0.98); }
        .btn-small { background: var(--accent); color: var(--text); border: none; padding: 6px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; font-weight:bold; }
        .btn-small:hover { background: #e0d4c8; }
        
        /* B. 單字卡 */
        .vocab-card { display: flex; flex-direction: column; gap: 10px; position: relative; border-left: 6px solid var(--primary); background: #fff; }
        .vocab-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(188, 163, 143, 0.3); }
        .vocab-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px dashed var(--accent); padding-bottom: 10px; }
        .vocab-en { font-size: 19px; font-weight: bold; color: var(--primary-dark); margin-bottom: 2px; }
        .vocab-ch { font-size: 14px; color: #888; transition: 0.3s; line-height: 1.5; }
        .hide-chinese .vocab-ch { filter: blur(6px); opacity: 0.3; user-select: none; }
        
        /* 考題寶典 UI */
        .q-tag { display: inline-block; background: var(--accent); color: var(--primary-dark); font-size: 11px; padding: 4px 12px; border-radius: 50px; margin-bottom: 10px; font-weight: bold; }
        .option-label { display: block; background: var(--bg); padding: 12px; border-radius: 12px; margin: 8px 0; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .option-label:hover { background: var(--accent); }
        input[type="radio"]:checked + span { font-weight: bold; color: var(--primary-dark); }
        
        /* 紅框清楚標示 */
        .wrong-ans-box { background: var(--bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 2px solid var(--error); box-shadow: 0 4px 10px rgba(224, 122, 95, 0.15); }
        
        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        
        /* Snoopy 可愛元素 */
        .snoopy-deco { text-align: center; margin: 10px 0; color: var(--primary-dark); font-size: 18px; font-weight: bold; }

        /* 講義表格風格 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { border: 1px solid var(--accent); padding: 10px; text-align: left; }
        th { background: var(--accent); color: var(--primary-dark); }
    </style>
</head>
<body>

<header class="app-header">
    <button class="menu-dots" onclick="toggleMenu()">🐾</button>
    <div id="sideMenu" class="side-menu">
        <a href="javascript:void(0)" onclick="showSection('progress-section')">學習進度</a>
        <a href="javascript:void(0)" onclick="showSection('vocab-section')">核心觀念</a>
        <a href="javascript:void(0)" onclick="showSection('exam-section')">考題寶典</a>
        <a href="javascript:void(0)" onclick="showSection('review-section')">錯題複習</a>
    </div>
    <div class="snoopy-title">生成式AI考照助手</div>
    <button class="btn-clear" onclick="clearAllData()">清除紀錄</button>
</header>

<section id="progress-section" class="content-section active-sec">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('progress', 0)">🏆 完成度</button>
        <button class="tab-btn" onclick="switchTab('progress', 1)">📅 每日刷題狀況</button>
    </div>

    <div id="progress-0" class="tab-content">
        <div class="card" style="text-align:center">
            <h3 class="snoopy-deco">🏆 整體題庫掌握度</h3>
            <div class="circle-progress" id="progressCircle" style="--p: 0%">
                <div class="progress-text" id="progressVal">0%</div>
            </div>
            <p style="font-size:14px; color:#666;">(扣除錯題後的精熟比例)<br>已精熟：<span id="masteredCount" style="font-weight:bold; color:var(--primary-dark);">0</span> / <span id="totalCount">0</span> 題</p>
        </div>
    </div>

    <div id="progress-1" class="tab-content" style="display:none">
        <div class="card" style="text-align:center">
            <h3 class="snoopy-deco">📅 今日刷題狀況 (<span id="todayDate"></span>)</h3>
            <div style="display:flex; justify-content:space-around; margin-top:20px;">
                <div>
                    <div style="font-size:30px; font-weight:bold; color:var(--primary-dark);" id="todayCount">0</div>
                    <div style="font-size:12px; color:#888;">做了幾題</div>
                </div>
                <div>
                    <div style="font-size:30px; font-weight:bold; color:var(--success);" id="todayAvgScore">0</div>
                    <div style="font-size:12px; color:#888;">平均分數</div>
                </div>
            </div>
            <p style="margin-top:20px; font-size:13px; color:#999;">※ 自動記錄並於每天跨日累積重置</p>
        </div>
    </div>
</section>

<section id="vocab-section" class="content-section">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('vocab', 0)">單字卡</button>
        <button class="tab-btn" onclick="switchTab('vocab', 1)">星號註記</button>
        <button class="tab-btn" onclick="switchTab('vocab', 2)">講義</button>
        <button class="tab-btn" onclick="switchTab('vocab', 3)">補充</button>
    </div>

    <div id="vocab-0" class="tab-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <span style="font-size:14px; font-weight:bold; color:var(--primary-dark)">總詞彙量：<span id="vocabTotalCount"></span></span>
            <button class="btn-small" id="toggleChBtn" onclick="toggleChinese()">👁️ 隱藏中文</button>
        </div>
        <div id="vocabList"></div>
        <div class="pagination">
            <button class="btn-small" onclick="changePage(-1)">◀ 上一頁</button>
            <span id="pageInfo" style="font-size:14px; font-weight:bold; align-self:center; color: var(--primary-dark);"></span>
            <button class="btn-small" onclick="changePage(1)">下一頁 ▶</button>
        </div>
    </div>

    <div id="vocab-1" class="tab-content" style="display:none">
        <div class="card">
            <h3 class="snoopy-deco">⭐ 星號重點單字</h3>
            <div id="starredList" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div id="vocab-2" class="tab-content" style="display:none">
        <div class="card">
            <label>選擇主題講義：</label>
            <select id="topicSelect" onchange="renderTopicNotes()">
                <option value="模型基礎">模型基礎與核心考點</option>
                <option value="風險治理">風險治理與法規解析</option>
                <option value="提示工程">進階技術與提示工程</option>
            </select>
            <div id="topicNotesArea" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div id="vocab-3" class="tab-content" style="display:none">
        <div class="card">
            <h3 class="snoopy-deco">📎 外部參考連結</h3>
            <p>1. <a href="#" style="color:var(--primary-dark)">金管會金融業導入 AI 指引</a></p>
            <p>2. <a href="#" style="color:var(--primary-dark)">OpenAI Prompt Engineering 官方指南</a></p>
            <div class="snoopy-deco" style="margin-top:30px;">🐾...</div>
        </div>
    </div>
</section>

<section id="exam-section" class="content-section">
    <div class="card" id="quizFilter">
        <h3 class="snoopy-deco">📝 測驗設定</h3>
        <label>選擇題數</label>
        <select id="setCount">
            <option value="5">5 題</option>
            <option value="10">10 題</option>
            <option value="15">15 題</option>
            <option value="20">20 題</option>
        </select>
        <label>難易度</label>
        <select id="setLevel">
            <option value="簡易">簡易</option>
            <option value="中級" selected>中級</option>
            <option value="困難">困難</option>
        </select>
        <div style="margin-bottom: 15px;">
            <label style="display:block;"><input type="checkbox" id="srcMock" checked> 模擬題庫</label>
            <label style="display:block;"><input type="checkbox" id="srcVocab" checked> 核心觀念自動出題</label>
        </div>
        <button class="btn-main" onclick="generateQuiz()">🐾 開始測驗</button>
    </div>

    <div id="quizArea" style="display:none">
        <div id="questionList"></div>
        <button class="btn-main" onclick="gradeExam()">✅ 送出評分</button>
    </div>

    <div id="examResult" class="card" style="display:none; text-align:center;">
        <h2 style="color:var(--primary-dark);">測驗結果</h2>
        <div style="font-size: 55px; font-weight: bold; color: var(--primary);" id="scoreDisplay"></div>
        <div id="scoreMessage" style="font-weight:bold; margin-bottom:15px;"></div>
        <div id="errExplanations" style="text-align:left; margin-top:20px;"></div>
        <button class="btn-main" onclick="resetExam()">🔄 再測一次</button>
    </div>
</section>

<section id="review-section" class="content-section">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('review', 0)">錯題本</button>
        <button class="tab-btn" onclick="switchTab('review', 1)">重點錯題本</button>
    </div>
    <div id="review-0" class="tab-content"><div id="reviewListNormal"></div></div>
    <div id="review-1" class="tab-content" style="display:none"><div id="reviewListBoss"></div></div>
</section>

<script>
    // ================= 資料庫 (v1-v100) =================
    let vocabBank = [
        { id: 'v1', en: "LLM", ch: "大型語言模型", def: "基於巨量資料訓練，具備理解與生成能力的深度學習模型。", topic: "基礎觀念" },
        { id: 'v2', en: "Token", ch: "標記 / 權杖", def: "模型處理文字的最小單位，可能是單字、詞或字元。", topic: "基礎觀念" },
        { id: 'v3', en: "Context Window", ch: "上下文窗口", def: "模型單次對話中能處理的最大 Token 範圍。", topic: "基礎觀念" },
        { id: 'v4', en: "Transformer", ch: "轉換器架構", def: "基於注意力機制的底層架構，是現代 LLM 的核心。", topic: "基礎觀念" },
        { id: 'v5', en: "Self-Attention", ch: "自注意力機制", def: "計算輸入序列中不同位置之間的相關性權重。", topic: "基礎觀念" },
        { id: 'v6', en: "Encoder / Decoder", ch: "編碼器 / 解碼器", def: "將資訊轉換為向量表示（編碼）並還原為文字（解碼）。", topic: "基礎觀念" },
        { id: 'v7', en: "Prompt", ch: "提示詞", def: "使用者輸入給模型以引導其產生特定輸出的指令。", topic: "提示工程" },
        { id: 'v8', en: "Zero-shot / Few-shot", ch: "零樣本 / 少樣本學習", def: "在不提供或僅提供少量範例的情況下讓模型執行任務。", topic: "提示工程" },
        { id: 'v9', en: "Temperature", ch: "溫度", def: "控制輸出隨機性的參數；數值越高，產出越具創意。", topic: "提示工程" },
        { id: 'v10', en: "Top-k / Top-p", ch: "Top-k / 核取樣", def: "限制模型從機率最高的前 k 個或累積機率 p 的詞中選取。", topic: "提示工程" },
        { id: 'v11', en: "Embedding", ch: "嵌入 / 向量化", def: "將文字轉換為高維度空間中的數學向量表示。", topic: "資料處理" },
        { id: 'v12', en: "Vector Database", ch: "向量資料庫", def: "專門儲存與檢索高維度向量資料的資料庫（如 Pinecone）。", topic: "資料處理" },
        { id: 'v13', en: "Similarity Search", ch: "相似性搜尋", def: "在向量空間中尋找語意最接近的內容（如餘弦相似度）。", topic: "資料處理" },
        { id: 'v14', en: "RAG", ch: "檢索增強生成", def: "結合外部資料檢索以補充模型知識，解決幻覺問題。", topic: "系統架構" },
        { id: 'v15', en: "Chunking", ch: "文本切塊", def: "將長文本拆分為較小片段以便於處理與檢索。", topic: "資料處理" },
        { id: 'v16', en: "Metadata", ch: "元數據 / 詮釋資料", def: "描述資料的資料（如日期、來源），用於精準過濾檢索。", topic: "資料處理" },
        { id: 'v17', en: "Hallucination", ch: "幻覺", def: "模型生成看似合理但事實錯誤或虛假資訊的現象。", topic: "風險治理" },
        { id: 'v18', en: "Fine-tuning", ch: "微調", def: "在特定領域資料集上進一步訓練預訓練模型。", topic: "模型訓練" },
        { id: 'v19', en: "Instruction Tuning", ch: "指令微調", def: "透過指令式資料訓練模型，使其更能聽懂並執行任務。", topic: "模型訓練" },
        { id: 'v20', en: "RLHF", ch: "人類回饋強化學習", def: "透過人類評分來調整模型，使其符合人類價值觀與偏好。", topic: "模型訓練" },
        { id: 'v21', en: "API", ch: "應用程式介面", def: "讓不同應用程式之間能交換資料與調用模型能力的通道。", topic: "應用開發" },
        { id: 'v22', en: "Latency", ch: "延遲", def: "從發送請求到收到回應所需的時間。", topic: "應用開發" },
        { id: 'v23', en: "Throughput", ch: "吞吐量", def: "系統在單位時間內能處理的資料量或請求數。", topic: "應用開發" },
        { id: 'v24', en: "Inference", ch: "推論", def: "模型在運行時根據輸入數據產生結果的過程。", topic: "模型訓練" },
        { id: 'v25', en: "Model Drift", ch: "模型偏移", def: "隨著時間推移，模型表現或資料分佈與訓練時產生落差。", topic: "風險治理" },
        { id: 'v26', en: "Data Leakage", ch: "資料洩漏", def: "敏感資料非預期地被包含在模型輸出或訓練集中。", topic: "風險治理" },
        { id: 'v27', en: "PII", ch: "個人識別資訊", def: "任何可用於辨識特定個人的資料（如身分證號）。", topic: "風險治理" },
        { id: 'v28', en: "Anonymization", ch: "去識別化 / 匿名化", def: "處理資料使其無法關聯回特定個人，以保護隱私。", topic: "風險治理" },
        { id: 'v29', en: "Federated Learning", ch: "聯邦學習", def: "在不交換原始資料的情況下，分散式訓練模型的技術。", topic: "模型訓練" },
        { id: 'v30', en: "Human-in-the-loop", ch: "人機協作（在環）", def: "在決策流程中，需要人類介入確認或修正結果。", topic: "風險治理" },
        { id: 'v31', en: "Human-over-the-loop", ch: "人類監督（在旁）", def: "人類監控系統自動化過程，必要時才介入干預。", topic: "風險治理" },
        { id: 'v32', en: "Responsible AI", ch: "責任 AI", def: "確保 AI 開發與應用符合道德、公平與法律。", topic: "風險治理" },
        { id: 'v33', en: "Explainability", ch: "可解釋性", def: "能夠理解並解釋 AI 模型做出特定決策的原因。", topic: "風險治理" },
        { id: 'v34', en: "Bias", ch: "偏見", def: "模型產出中存在的系統性不公平或偏袒特定群體。", topic: "風險治理" },
        { id: 'v35', en: "Fairness", ch: "公平性", def: "確保 AI 系統對不同背景的使用者皆無歧視地對待。", topic: "風險治理" },
        { id: 'v36', en: "No-code", ch: "無程式碼", def: "使用者不需撰寫程式碼即可建立應用程式的平台。", topic: "應用開發" },
        { id: 'v37', en: "Low-code", ch: "低程式碼", def: "僅需少量撰寫程式碼即可快速開發應用的平台。", topic: "應用開發" },
        { id: 'v38', en: "Workflow Automation", ch: "工作流自動化", def: "將重複性任務串聯起來自動執行的過程。", topic: "應用開發" },
        { id: 'v39', en: "Agent", ch: "代理人", def: "具備自主拆解任務、調用工具並達成目標能力的 AI。", topic: "系統架構" },

    }

    function switchTab(sectionName, idx) {
        const section = document.getElementById(`${sectionName}-section`);
        section.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        section.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`${sectionName}-${idx}`).style.display = 'block';
        section.querySelectorAll('.tab-btn')[idx].classList.add('active');
        if(sectionName === 'vocab' && idx === 1) renderStarred();
        if(sectionName === 'vocab' && idx === 2) renderTopicNotes();
        if(sectionName === 'review') renderReview(); 
    }

    function updateProgressUI() {
        const fullBankSize = masterBank.length + vocabBank.length; 
        const errCount = Object.keys(errorStats).length;
        const mastered = Math.max(0, fullBankSize - errCount);
        const p = fullBankSize > 0 ? Math.round((mastered / fullBankSize) * 100) : 0;
        
        document.getElementById('progressCircle').style.setProperty('--p', p + '%');
        document.getElementById('progressVal').innerText = p + '%';
        document.getElementById('masteredCount').innerText = mastered;
        document.getElementById('totalCount').innerText = fullBankSize;

        let today = new Date().toLocaleDateString('zh-TW');
        document.getElementById('todayDate').innerText = today;
        if (dailyStats.date !== today) {
            dailyStats = { date: today, count: 0, scoreSum: 0, exams: 0 };
        }
        document.getElementById('todayCount').innerText = dailyStats.count;
        let avg = dailyStats.exams > 0 ? Math.round(dailyStats.scoreSum / dailyStats.exams) : 0;
        document.getElementById('todayAvgScore').innerText = avg;
    }

    function renderVocab() {
        const list = document.getElementById('vocabList');
        document.getElementById('vocabTotalCount').innerText = vocabBank.length;
        const start = vocabPage * VOCAB_PER_PAGE;
        const pageData = vocabBank.slice(start, start + VOCAB_PER_PAGE);
        list.innerHTML = pageData.map(v => `
            <div class="card vocab-card">
                <div class="vocab-header">
                    <div><div class="vocab-en">${v.en}</div><span class="q-tag">#${v.topic}</span></div>
                    <div><button class="btn-small" onclick="speak('${v.en}')">🔊 發音</button>
                    <button class="btn-small ${starredVocab.includes(v.id) ? 'starred' : ''}" onclick="toggleStar('${v.id}')">⭐ 收藏</button></div>
                </div>
                <div class="vocab-ch" style="font-weight:bold;">${v.ch}</div>
                <div class="vocab-ch">${v.def}</div>
            </div>
        `).join('');
        document.getElementById('pageInfo').innerText = `${vocabPage + 1} / ${Math.ceil(vocabBank.length/VOCAB_PER_PAGE)}`;
    }

    function changePage(dir) {
        vocabPage = Math.max(0, Math.min(Math.ceil(vocabBank.length/VOCAB_PER_PAGE)-1, vocabPage + dir));
        renderVocab();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleChinese() { isChHidden = !isChHidden; document.body.classList.toggle('hide-chinese', isChHidden); }

    function speak(text) { const ut = new SpeechSynthesisUtterance(text); ut.lang = 'en-US'; speechSynthesis.speak(ut); }

    function toggleStar(id) {
        if(starredVocab.includes(id)) starredVocab = starredVocab.filter(s => s !== id);
        else starredVocab.push(id);
        localStorage.setItem('starredVocab', JSON.stringify(starredVocab));
        renderVocab(); renderStarred();
    }

    function renderStarred() {
        const list = document.getElementById('starredList');
        const starredData = vocabBank.filter(v => starredVocab.includes(v.id));
        if(starredData.length === 0) { list.innerHTML = "<p style='text-align:center;'>無星號單字。</p>"; return; }
        list.innerHTML = starredData.map(v => `<div class="card"><b>${v.en}</b><br>${v.ch}<br>${v.def}</div>`).join('');
    }

    function renderTopicNotes() {
        const topic = document.getElementById('topicSelect').value;
        document.getElementById('topicNotesArea').innerHTML = topicNotes[topic] || "<p>暫無內容</p>";
    }

    function generateQuiz() {
        const count = parseInt(document.getElementById('setCount').value);
        const level = document.getElementById('setLevel').value;
        const useMock = document.getElementById('srcMock').checked;
        const useVocab = document.getElementById('srcVocab').checked;
        let pool = [];
        if(useMock) pool = pool.concat(masterBank);
        if(useVocab) {
            pool = pool.concat(vocabBank.map(v => {
                let wrongs = vocabBank.filter(x => x.id !== v.id).sort(()=>0.5-Math.random()).slice(0,3).map(x=>x.def);
                let opts = [v.def, ...wrongs].sort(()=>0.5-Math.random());
                return { id: 'vq_'+v.id, level: "中級", tag: "觀念", q: `「${v.en}」正確定義？`, options: opts, ans: opts.indexOf(v.def), exp: v.def };
            }));
        }
        currentQuiz = pool.filter(q => q.level === level).sort(() => 0.5 - Math.random()).slice(0, count);
        document.getElementById('quizFilter').style.display = 'none';
        document.getElementById('quizArea').style.display = 'block';
        document.getElementById('questionList').innerHTML = currentQuiz.map((q, i) => `
            <div class="card"><p><b>Q${i+1}: ${q.q}</b></p>
            ${q.options.map((o, oi) => `<label class="option-label"><input type="radio" name="q${i}" value="${oi}"> <span>${o}</span></label>`).join('')}</div>
        `).join('');
    }

    function gradeExam() {
        let wrong = 0; let html = "";
        currentQuiz.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if (!sel || parseInt(sel.value) !== q.ans) {
                wrong++; errorStats[q.id] = (errorStats[q.id] || 0) + 1;
                html += `<div class="wrong-ans-box"><b>${q.q}</b><br>✅ 正確: ${q.options[q.ans]}</div>`;
            }
        });
        localStorage.setItem('errorStats', JSON.stringify(errorStats));
        const score = Math.round(((currentQuiz.length - wrong) / currentQuiz.length) * 100);
        dailyStats.count += currentQuiz.length; dailyStats.scoreSum += score; dailyStats.exams += 1;
        localStorage.setItem('dailyStats', JSON.stringify(dailyStats));
        document.getElementById('quizArea').style.display = 'none';
        document.getElementById('examResult').style.display = 'block';
        document.getElementById('scoreDisplay').innerText = score;
        document.getElementById('errExplanations').innerHTML = html || "全對！";
    }

    function resetExam() { document.getElementById('examResult').style.display = 'none'; document.getElementById('quizFilter').style.display = 'block'; }

    function renderReview() {
        const ids = Object.keys(errorStats);
        const list = document.getElementById('reviewListNormal');
        list.innerHTML = ids.length ? "有錯題，點擊刪除已熟練題目。" : "目前無錯題。";
    }

    function deleteError(id) { delete errorStats[id]; localStorage.setItem('errorStats', JSON.stringify(errorStats)); updateProgressUI(); }

    function clearAllData() {
        if(confirm("確定要將所有紀錄歸零嗎？")) {
            localStorage.clear();
            errorStats = {};
            dailyStats = { date: "", count: 0, scoreSum: 0, exams: 0 };
            starredVocab = [];
            // 重置 UI 數字
            updateProgressUI();
            alert("已成功歸零。");
            location.reload(); 
        }
    }

    window.onload = () => { updateProgressUI(); renderTopicNotes(); };
</script>
</body>
</html>
