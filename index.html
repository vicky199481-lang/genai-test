<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☕ 史努比的生成式 AI 考照助手</title>
    <style>
        :root { 
            --primary: #BCA38F; --primary-dark: #8D6E63; --bg: #FAF6F0; --card: #FFFFFF; 
            --success: #A3B18A; --error: #E07A5F; --text: #5C4D43; --accent: #EFE6DD; 
        }
        body { font-family: 'Quicksand', 'Nunito', "微軟正黑體", sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 50px; line-height: 1.6; }
        .app-header { background: var(--card); display: flex; align-items: center; padding: 12px 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(188, 163, 143, 0.15); border-bottom: 2px solid var(--accent); }
        .menu-dots { background: none; border: none; color: var(--primary-dark); font-size: 24px; cursor: pointer; padding: 0 10px; }
        .snoopy-title { flex:1; text-align:center; font-weight:bold; font-size: 16px; color: var(--primary-dark); }
        .btn-clear { background: var(--accent); border: none; padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--text); cursor: pointer; font-weight: bold; }
        .side-menu { display: none; position: absolute; top: 55px; left: 10px; background: var(--card); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 15px; width: 180px; z-index: 1001; overflow: hidden; }
        .side-menu a { display: block; padding: 12px 15px; color: var(--text); text-decoration: none; border-bottom: 1px dashed var(--accent); font-size: 14px; font-weight: bold; }
        .tab-bar { display: flex; background: var(--accent); padding: 5px; border-radius: 50px; margin: 10px 0; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 8px 12px; border: none; background: transparent; border-radius: 50px; cursor: pointer; font-size: 13px; color: var(--primary-dark); white-space: nowrap; }
        .tab-btn.active { background: var(--card); font-weight: bold; }
        .content-section { display: none; padding: 15px; }
        .active-sec { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(188, 163, 143, 0.1); }
        .circle-progress { width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(var(--primary) var(--p, 0%), var(--accent) 0); display: flex; align-items: center; justify-content: center; margin: 20px auto; position: relative; }
        .circle-progress::after { content: ""; width: 95px; height: 95px; background: var(--card); border-radius: 50%; position: absolute; }
        .progress-text { position: relative; z-index: 1; font-size: 24px; font-weight: bold; color: var(--primary-dark); }
        select, input[type="text"] { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--accent); margin: 5px 0 15px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .vocab-card { border-left: 6px solid var(--primary); margin-bottom: 15px; }
        .q-tag { display: inline-block; background: var(--accent); color: var(--primary-dark); font-size: 11px; padding: 4px 12px; border-radius: 50px; margin-bottom: 10px; font-weight: bold; }
        .option-label { display: block; background: var(--bg); padding: 12px; border-radius: 12px; margin: 8px 0; cursor: pointer; }
        .wrong-ans-box { background: var(--bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 2px solid var(--error); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid var(--accent); padding: 10px; text-align: left; }
        th { background: var(--accent); }
    </style>
</head>
<body>

<header class="app-header">
    <button class="menu-dots" onclick="toggleMenu()">🐾</button>
    <div id="sideMenu" class="side-menu">
        <a href="javascript:void(0)" onclick="showSection('progress-section')">學習進度</a>
        <a href="javascript:void(0)" onclick="showSection('vocab-section')">核心觀念</a>
        <a href="javascript:void(0)" onclick="showSection('exam-section')">考題寶典</a>
        <a href="javascript:void(0)" onclick="showSection('review-section')">錯題複習</a>
    </div>
    <div class="snoopy-title">生成式AI考照助手</div>
    <button class="btn-clear" onclick="clearAllData()">清除紀錄</button>
</header>

<section id="progress-section" class="content-section active-sec">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('progress', 0)">🏆 完成度</button>
        <button class="tab-btn" onclick="switchTab('progress', 1)">📅 刷題狀況</button>
    </div>
    <div id="progress-0" class="tab-content">
        <div class="card" style="text-align:center">
            <h3 style="color:var(--primary-dark)">🏆 整體掌握度</h3>
            <div class="circle-progress" id="progressCircle" style="--p: 0%">
                <div class="progress-text" id="progressVal">0%</div>
            </div>
            <p>已精熟：<span id="masteredCount">0</span> / <span id="totalCount">0</span> 題</p>
        </div>
    </div>
    <div id="progress-1" class="tab-content" style="display:none">
        <div class="card" style="text-align:center">
            <h3>今日狀況：做了 <span id="todayCount">0</span> 題</h3>
            <h3>平均分數：<span id="todayAvgScore">0</span> 分</h3>
        </div>
    </div>
</section>

<section id="vocab-section" class="content-section">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('vocab', 0)">單字卡</button>
        <button class="tab-btn" onclick="switchTab('vocab', 1)">星號註記</button>
        <button class="tab-btn" onclick="switchTab('vocab', 2)">講義</button>
    </div>
    <div id="vocab-0" class="tab-content">
        <div id="vocabList"></div>
        <div class="pagination" style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
            <button onclick="changePage(-1)">◀ 上一頁</button>
            <span id="pageInfo"></span>
            <button onclick="changePage(1)">下一頁 ▶</button>
        </div>
    </div>
    <div id="vocab-1" class="tab-content" style="display:none"><div id="starredList"></div></div>
    <div id="vocab-2" class="tab-content" style="display:none">
        <div class="card">
            <select id="topicSelect" onchange="renderTopicNotes()">
                <option value="模型基礎">模型基礎</option>
                <option value="風險治理">風險治理</option>
                <option value="提示工程">提示工程</option>
            </select>
            <div id="topicNotesArea"></div>
        </div>
    </div>
</section>

<section id="exam-section" class="content-section">
    <div class="card" id="quizFilter">
        <h3>📝 測驗設定</h3>
        <label>題數</label>
        <select id="setCount"><option value="5">5 題</option><option value="10">10 題</option><option value="27">全做</option></select>
        <label>難度</label>
        <select id="setLevel"><option value="簡易">簡易</option><option value="中級" selected>中級</option><option value="困難">困難</option></select>
        <button class="btn-main" onclick="generateQuiz()">🐾 開始</button>
    </div>
    <div id="quizArea" style="display:none">
        <div id="questionList"></div>
        <button class="btn-main" onclick="gradeExam()">✅ 送出</button>
    </div>
    <div id="examResult" class="card" style="display:none; text-align:center;">
        <h2 id="scoreDisplay">0分</h2>
        <div id="errExplanations"></div>
        <button class="btn-main" onclick="resetExam()">🔄 重來</button>
    </div>
</section>

<section id="review-section" class="content-section">
    <div class="card"><h3>🎯 錯題本</h3><div id="reviewListNormal"></div></div>
</section>

<script>
    // ================= 完整資料庫 (V1-V100) =================
    const vocabBank = [
        { id: 'v1', en: "LLM", ch: "大型語言模型", def: "基於巨量資料訓練，具備理解與生成能力的深度學習模型。", topic: "基礎觀念" },

        { id: 'v9', en: "Temperature", ch: "溫度", def: "控制輸出隨機性的參數；數值越高，產出越具創意。", topic: "提示工程" },

        { id: 'q7', level: "中級", tag: "原理", q: "隨機雜訊轉逼真圖像的模型？", options: ["GAN", "Transformer", "RNN", "SVM"], ans: 0, exp: "GAN。" },
        { id: 'q8', level: "簡易", tag: "LLM", q: "LLM 理解能力基於何種架構？", options: ["Transformer", "隨機森林", "CNN", "RNN"], ans: 0, exp: "Transformer。" },

        { id: 'q10', level: "中級", tag: "名詞", q: "RNN 中文翻譯？", options: ["遞迴", "循環神經網路", "隨機", "強化"], ans: 1, exp: "循環神經網路。" },
        { id: 'q11', level: "簡易", tag: "特性", q: "模型陳述錯誤事實的現象？", options: ["過擬合", "梯度消失", "幻覺", "投毒"], ans: 2, exp: "幻覺。" },

        { id: 'q13', level: "中級", tag: "技術", q: "RAG 利用外部資訊？", options: ["覆蓋", "參考上下文", "僅驗證", "轉圖片"], ans: 1, exp: "參考上下文。" },
        { id: 'q14', level: "中級", tag: "工具", q: "Azure 提供的 TTS 產品？", options: ["Polly", "WaveNet", "Azure AI Speech", "Watson"], ans: 2, exp: "Azure AI Speech。" },
        { id: 'q15', level: "困難", tag: "效能", q: "提升 LLM 複雜任務表現的關鍵？", options: ["減資", "多樣化學習", "限語", "移注意力"], ans: 1, exp: "多樣化模式。" },
        { id: 'q16', level: "中級", tag: "工程", q: "展示中間思考過程 (CoT)？", options: ["零樣本", "思路鏈", "逆向", "情感"], ans: 1, exp: "思路鏈。" },
        { id: 'q17', level: "困難", tag: "資料", q: "處理缺漏值最不適當？", options: ["平均填補", "回歸", "全刪整列", "標記"], ans: 2, exp: "全刪整列不當。" },
        { id: 'q18', level: "中級", tag: "法規", q: "歐盟 AI 法案分級標準？", options: ["風險程度", "國別", "開源", "禁止"], ans: 0, exp: "風險程度。" },
        { id: 'q19', level: "困難", tag: "倫理", q: "不屬於倫理要求？", options: ["透明", "公平", "利潤最大化", "問責"], ans: 2, exp: "利潤最大化。" },
        { id: 'q20', level: "困難", tag: "RAG", q: "遺漏關鍵資訊的做法？", options: ["增溫", "再排序 Reranking", "Fine-tune", "停切"], ans: 1, exp: "Reranking。" },
        { id: 'q21', level: "困難", tag: "多模態", q: "分割圖片區塊稱為？", options: ["Tokens", "Image Patches", "Layers", "Clusters"], ans: 1, exp: "Image Patches。" },
        { id: 'q22', level: "中級", tag: "安全", q: "洩漏系統指令稱為？", options: ["Poisoning", "Drift", "Prompt Leakage", "Hallucination"], ans: 2, exp: "Prompt Leakage。" },
        { id: 'q23', level: "困難", tag: "成本", q: "降低重複背景費用？", options: ["Context Caching", "Quantization", "Inference", "Rate"], ans: 0, exp: "Context Caching。" },
        { id: 'q24', level: "中級", tag: "合規", q: "信用評等風險等級？", options: ["不可接受", "高風險", "有限", "最低"], ans: 1, exp: "高風險。" },
        { id: 'q25', level: "困難", tag: "Agent", q: "拆解子任務的組件？", options: ["Caller", "Planner", "Memory", "Executor"], ans: 1, exp: "Planner。" },
        { id: 'q26', level: "中級", tag: "技巧", q: "一步一步思考是？", options: ["Few-shot", "CoT", "Injection", "Zero"], ans: 1, exp: "CoT。" },
        { id: 'q27', level: "困難", tag: "部署", q: "不影響所有用戶的測試策略？", options: ["Blue-Green", "Canary Deployment", "Recreate", "Shadow"], ans: 1, exp: "金絲雀部署。" }
    ];

    const topicNotes = {
        "模型基礎": "<h3>核心考點</h3><p>LLM, Transformer, Token, Attention。</p>",
        "風險治理": "<h3>治理</h3><p>GDPR 罰款上限營業額 4%。</p>",
        "提示工程": "<h3>技巧</h3><p>Reranking, CoT, HyDE。</p>"
    };

    // ================= 狀態控制 =================
    let errorStats = JSON.parse(localStorage.getItem('errorStats')) || {};
    let dailyStats = JSON.parse(localStorage.getItem('dailyStats')) || { date: "", count: 0, scoreSum: 0, exams: 0 };
    let starredVocab = JSON.parse(localStorage.getItem('starredVocab')) || [];
    let vocabPage = 0;
    const PAGE_SIZE = 10;

    function toggleMenu() { document.getElementById('sideMenu').style.display = (document.getElementById('sideMenu').style.display==='block')?'none':'block'; }
    
    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById(id).classList.add('active-sec');
        document.getElementById('sideMenu').style.display = 'none';
        if(id==='progress-section') updateProgressUI();
        if(id==='vocab-section') renderVocab();
        if(id==='review-section') renderReview();
    }

    function switchTab(sec, idx) {
        const s = document.getElementById(`${sec}-section`);
        s.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        s.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`${sec}-${idx}`).style.display = 'block';
        s.querySelectorAll('.tab-btn')[idx].classList.add('active');
        if(sec==='vocab' && idx===1) renderStarred();
    }

    function updateProgressUI() {
        const total = vocabBank.length + masterBank.length;
        const errs = Object.keys(errorStats).length;
        const mastered = Math.max(0, total - errs);
        const p = Math.round((mastered / total) * 100);
        document.getElementById('progressCircle').style.setProperty('--p', p + '%');
        document.getElementById('progressVal').innerText = p + '%';
        document.getElementById('masteredCount').innerText = mastered;
        document.getElementById('totalCount').innerText = total;
        document.getElementById('todayCount').innerText = dailyStats.count;
        document.getElementById('todayAvgScore').innerText = dailyStats.exams > 0 ? Math.round(dailyStats.scoreSum / dailyStats.exams) : 0;
    }

    function renderVocab() {
        const list = document.getElementById('vocabList');
        const data = vocabBank.slice(vocabPage*PAGE_SIZE, (vocabPage+1)*PAGE_SIZE);
        list.innerHTML = data.map(v => `
            <div class="card vocab-card">
                <span class="q-tag">#${v.topic}</span>
                <div style="font-weight:bold; font-size:18px;">${v.en}</div>
                <div>${v.ch}</div>
                <div style="font-size:13px; color:#666">${v.def}</div>
                <button onclick="toggleStar('${v.id}')">${starredVocab.includes(v.id)?'★ 已收藏':'☆ 收藏'}</button>
            </div>
        `).join('');
        document.getElementById('pageInfo').innerText = `${vocabPage+1} / 10`;
    }
    function changePage(d) { vocabPage = Math.max(0, Math.min(9, vocabPage+d)); renderVocab(); }
    function toggleStar(id) { 
        if(starredVocab.includes(id)) starredVocab = starredVocab.filter(i=>i!==id); else starredVocab.push(id);
        localStorage.setItem('starredVocab', JSON.stringify(starredVocab)); renderVocab();
    }
    function renderStarred() {
        document.getElementById('starredList').innerHTML = vocabBank.filter(v=>starredVocab.includes(v.id)).map(v=>`<div class="card"><b>${v.en}</b></div>`).join('') || "無收藏";
    }

    function generateQuiz() {
        const count = parseInt(document.getElementById('setCount').value);
        const level = document.getElementById('setLevel').value;
        const pool = masterBank.filter(q => q.level === level);
        currentQuiz = pool.sort(() => 0.5 - Math.random()).slice(0, count);
        document.getElementById('quizFilter').style.display = 'none';
        document.getElementById('quizArea').style.display = 'block';
        document.getElementById('questionList').innerHTML = currentQuiz.map((q, i) => `
            <div class="card"><p>Q${i+1}: ${q.q}</p>
            ${q.options.map((o, oi) => `<label class="option-label"><input type="radio" name="q${i}" value="${oi}"> ${o}</label>`).join('')}</div>
        `).join('');
    }
    function gradeExam() {
        let wrong = 0; let html = "";
        currentQuiz.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if(!sel || parseInt(sel.value) !== q.ans) {
                wrong++; errorStats[q.id] = (errorStats[q.id] || 0) + 1;
                html += `<div class="wrong-ans-box">${q.q}<br>✅ 正解: ${q.options[q.ans]}</div>`;
            }
        });
        localStorage.setItem('errorStats', JSON.stringify(errorStats));
        dailyStats.count += currentQuiz.length; dailyStats.exams++; dailyStats.scoreSum += Math.round(((currentQuiz.length-wrong)/currentQuiz.length)*100);
        localStorage.setItem('dailyStats', JSON.stringify(dailyStats));
        document.getElementById('quizArea').style.display = 'none';
        document.getElementById('examResult').style.display = 'block';
        document.getElementById('scoreDisplay').innerText = Math.round(((currentQuiz.length-wrong)/currentQuiz.length)*100) + "分";
        document.getElementById('errExplanations').innerHTML = html || "全對！";
    }
    function resetExam() { document.getElementById('examResult').style.display = 'none'; document.getElementById('quizFilter').style.display = 'block'; }
    function renderReview() {
        const ids = Object.keys(errorStats);
        document.getElementById('reviewListNormal').innerHTML = masterBank.filter(q=>ids.includes(q.id)).map(q=>`<div class="card">${q.q} (錯 ${errorStats[q.id]} 次) <button onclick="deleteErr('${q.id}')">刪除</button></div>`).join('') || "無錯題";
    }
    function deleteErr(id) { delete errorStats[id]; localStorage.setItem('errorStats', JSON.stringify(errorStats)); renderReview(); updateProgressUI(); }

    function renderTopicNotes() {
        const t = document.getElementById('topicSelect').value;
        document.getElementById('topicNotesArea').innerHTML = topicNotes[t];
    }

    // 終極修復清除功能：強制狀態重置
    function clearAllData() {
        if(confirm("確定全部歸零？")) {
            localStorage.clear();
            errorStats = {};
            dailyStats = { date: "", count: 0, scoreSum: 0, exams: 0 };
            starredVocab = [];
            // 立即刷新 UI 變數，不依賴 reload
            updateProgressUI();
            alert("已成功歸零！");
            location.reload(); 
        }
    }

    window.onload = () => { updateProgressUI(); renderTopicNotes(); };
</script>
