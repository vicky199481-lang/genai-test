<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍵 GenAI 認證全攻略：奶茶暖心版</title>
    <style>
        /* 🤎 燕麥奶茶配色 (Milk Tea Palette) */
        :root { 
            --primary: #C19A6B; /* 泰式奶茶色 (Thai Tea) - 主要色 */
            --bg: #FFFBF5; /* 暖牛奶白 (Warm Milk) - 背景色 */
            --card: #ffffff; /* 純白 - 卡片色 */
            --success: #A9B28B; /* 霧面抹茶 (Misty Matcha) - 成功色 */
            --error: #E6D0D0; /* 紅茶拿鐵 (Red Tea Latte) - 錯誤色 */
            --text: #5D4037; /* 深棕色 (Deep Brown) - 字體色 */
            --accent: #EFEBE9; /* 淺燕麥色 (Light Oat) - 強調色 */
            --gold: #D4AF37; /* 金色 - 星號色 */
        }

        body { 
            font-family: -apple-system, "微軟正黑體", " rounded", sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding-bottom: 30px; 
            color: var(--text);
            overflow-x: hidden;
        }

        /* 🎀 Header & 選單 (Milk Tea Style) */
        .app-header { 
            background: var(--card); 
            color: var(--primary); 
            display: flex; 
            align-items: center; 
            padding: 18px 15px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(193,154,107,0.08); 
            border-bottom: 2px solid var(--accent);
        }
        .menu-dots { 
            background: none; 
            border: none; 
            color: var(--primary); 
            font-size: 28px; 
            cursor: pointer; 
            padding: 0 10px; 
            font-weight: bold;
        }
        .side-menu { 
            display: none; 
            position: absolute; 
            top: 65px; 
            left: 10px; 
            background: var(--card); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            border-radius: 18px; 
            width: 190px; 
            z-index: 1001; 
            overflow: hidden; 
            border: 1px solid var(--accent);
        }
        .side-menu a { 
            display: block; 
            padding: 16px 20px; 
            color: var(--text); 
            text-decoration: none; 
            border-bottom: 1px solid var(--accent); 
            font-size: 0.95em; 
            transition: background 0.2s; 
        }
        .side-menu a:active { background: var(--bg); }
        .app-title { flex: 1; text-align: center; margin: 0; font-size: 1.15em; font-weight: 800; margin-right: 40px; color: var(--text); }

        /* 🍡 區塊與 Tabs */
        .content-section { display: none; padding: 15px; }
        .active { display: block; }
        .tab-bar { 
            display: flex; 
            background: var(--accent); 
            padding: 5px; 
            border-radius: 50px; 
            margin-bottom: 20px; 
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.02); 
        }
        .tab-btn { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            background: transparent; 
            border-radius: 50px; 
            font-weight: bold; 
            color: #999; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 0.9em;
        }
        .tab-btn.active { 
            background: var(--card); 
            color: var(--primary); 
            box-shadow: 0 4px 12px rgba(193,154,107,0.15); 
        }

        /* 🤎 奶酪卡片 Style */
        .vocab-card, .quiz-card, .exam-filter, .result-card, .error-item { 
            background: var(--card); 
            border-radius: 20px; /* 大圓角 */
            padding: 22px; 
            margin-bottom: 18px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.03); /* 柔和深陰影 */
            position: relative; 
            border: 1px solid rgba(193,154,107,0.05); /* 微弱邊框 */
            transition: transform 0.2s;
        }
        .vocab-card:active, .quiz-card:active { transform: scale(0.98); }

        /* 🌟 單字功能 */
        .star-btn { position: absolute; right: 18px; top: 18px; background: none; border: none; font-size: 24px; color: #f0f0f0; cursor: pointer; padding: 5px; }
        .star-btn.active { color: var(--gold); animation: starPop 0.3s ease; }
        @keyframes starPop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .speak-btn { background: #fdfdfd; border: 1px solid #eee; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; margin-left: 10px; color: var(--primary); font-size: 1.1em; transition: 0.2s; }
        .speak-btn:active { background: #eee; }

        /* 🎯 測驗與按鈕 */
        .option-label { display: block; padding: 16px; border: 1.5px solid #eee; border-radius: 15px; margin-top: 12px; cursor: pointer; transition: 0.2s; font-size: 0.95em; color: var(--text); }
        .option-label:active { background: var(--accent); border-color: var(--primary); }
        input[type="radio"] { margin-right: 12px; transform: scale(1.2); accent-color: var(--primary); }

        .submit-btn { 
            width: 100%; 
            padding: 18px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 1.05em; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 8px 20px rgba(193,154,107,0.2); 
        }
        .submit-btn:active { transform: translateY(2px); box-shadow: 0 4px 10px rgba(193,154,107,0.2); }
        .del-btn { background: var(--accent); color: var(--text); border: none; padding: 8px 16px; border-radius: 50px; float: right; font-size: 0.8em; font-weight: bold; cursor: pointer;}
        
        select { width: 100%; padding: 15px; margin: 10px 0 25px 0; border-radius: 12px; border: 1.5px solid var(--accent); font-size: 1em; color: var(--text); background: var(--card); color: var(--text); accent-color: var(--primary); }
        h3, h4 { color: var(--text); font-weight: 800; margin-top: 0; }
        
        /* 錯題區裝飾 */
        .error-item { border-left: 6px solid var(--error); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header class="app-header">
        <button class="menu-dots" onclick="toggleMenu()">⋮</button>
        <div id="sideMenu" class="side-menu">
            <a href="javascript:void(0)" onclick="showSection('vocab-section')">📜 核心觀念</a>
            <a href="javascript:void(0)" onclick="showSection('exam-section')">📝 考題寶典</a>
            <a href="javascript:void(0)" onclick="showSection('review-section')">🔄 複習機制</a>
        </div>
        <h1 class="app-title">GenAI 考照助手 ☕</h1>
    </header>

    <section id="vocab-section" class="content-section active">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="openVocabTab(event, 'all-vocab')">全部觀念 🍪</button>
            <button class="tab-btn" onclick="openVocabTab(event, 'starred-vocab')">收藏夾 ⭐</button>
        </div>
        <div id="all-vocab" class="vocab-tab-content active"><div id="vocabList"></div></div>
        <div id="starred-vocab" class="vocab-tab-content" style="display:none;"><div id="starredList"></div></div>
    </section>

    <section id="exam-section" class="content-section">
        <div id="examSetup" class="exam-filter">
            <h3>🎯 測驗設定</h3>
            <label>選取題數：</label>
            <select id="qCount"><option value="5">5 題</option><option value="10">10 題</option></select>
            <button class="submit-btn" onclick="generateExam()">開始測驗 🚀</button>
        </div>
        <div id="quizArea" style="display:none;">
            <div id="questionList"></div>
            <button class="submit-btn" style="background:var(--success); color:white" onclick="gradeExam()">送出評分 抹茶🍵</button>
        </div>
        <div id="resultArea" class="result-card" style="display:none;">
            <h4>測驗結果 ☕</h4>
            <div id="scoreDisplay" style="font-size:3em; font-weight:900; color:var(--primary);"></div>
            <p id="resultMsg"></p>
            <button class="submit-btn" onclick="resetExam()">重新測驗 🔄</button>
        </div>
    </section>
</div>

<script>
    const dictionary = [
        { en: "Hallucination", zh: "幻覺", def: "模型生成內容看似正確實則錯誤的現象。" },
        { en: "Transformer", zh: "轉換器架構", def: "當代大語言模型(LLM)的核心技術架構。" },
        { en: "Temperature", zh: "溫度參數", def: "控制輸出隨機性。越低越嚴謹，越高越創意。" },
        { en: "RAG", zh: "檢索增強生成", def: "結合外部即時資料庫，減少錯誤並更新知識。" }
    ];

    const questionBank = [
        { id: 1, q: "關於 AI 的「幻覺」，下列敘述何者正確？", options: ["AI 喝醉了", "AI 自信地說出錯誤資訊", "AI 拒絕回答"], ans: 1 },
        { id: 2, q: "哪種技術能讓 AI 連結企業文件來回答問題？", options: ["RAG", "CPU", "GPU"], ans: 0 },
        { id: 3, q: "Temperature 參數調低會讓 AI 的內容？", options: ["更嚴謹", "更有創意", "更長"], ans: 0 },
        { id: 4, q: "要降低風險，導入 AI 前應先做？", options: ["資料去識別化", "增加電力", "重新開機"], ans: 0 }
    ];

    let starredEn = JSON.parse(localStorage.getItem('starredEn')) || [];
    let errorList = JSON.parse(localStorage.getItem('errorList')) || [];

    function toggleMenu() { const m = document.getElementById('sideMenu'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
    function showSection(id) { document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); toggleMenu(); if(id === 'vocab-section') renderVocab(); if(id === 'review-section') renderErrors(); }
    function renderVocab() { document.getElementById('vocabList').innerHTML = dictionary.map(i => `<div class="vocab-card"><button class="star-btn ${starredEn.includes(i.en)?'active':''}" onclick="toggleStar('${i.en}', this)">★</button><div style="display:flex; align-items:center;"><b style="color:var(--primary); font-size:1.15em;">${i.en}</b><button class="speak-btn" onclick="speak('${i.en}')">🔊</button></div><div style="margin:4px 0; font-weight:bold; color:var(--text);">${i.zh}</div><p style="font-size:0.85em; color:#777; border-top:1px dashed #eee; padding-top:8px; margin-top:8px;">${i.def}</p></div>`).join(''); }
    function toggleStar(en, btn) { if(starredEn.includes(en)) starredEn = starredEn.filter(i => i !== en); else starredEn.push(en); localStorage.setItem('starredEn', JSON.stringify(starredEn)); btn.classList.toggle('active'); }
    function openVocabTab(evt, name) { document.querySelectorAll('.vocab-tab-content').forEach(c => c.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(name).style.display = 'block'; evt.currentTarget.classList.add('active'); if(name === 'starred-vocab') renderStarred(); }
    function renderStarred() { const d = dictionary.filter(i => starredEn.includes(i.en)); document.getElementById('starredList').innerHTML = d.length ? d.map(i => `<div class="vocab-card"><b>${i.en}</b> (${i.zh})</div>`).join('') : '<p style="text-align:center;color:#999;padding:20px;">尚無收藏 ⭐</p>'; }
    function generateExam() { const count = parseInt(document.getElementById('qCount').value); currentQuestions = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, count); document.getElementById('examSetup').style.display = 'none'; document.getElementById('quizArea').style.display = 'block'; document.getElementById('questionList').innerHTML = currentQuestions.map((q, idx) => `<div class="quiz-card"><p><b>Q${idx+1}:</b> ${q.q}</p>${q.options.map((o, oi) => `<label class="option-label"><input type="radio" name="q${idx}" value="${oi}"> ${o}</label>`).join('')}</div>`).join(''); window.scrollTo(0,0); }
    function gradeExam() { let score = 0; currentQuestions.forEach((q, idx) => { const s = document.querySelector(`input[name="q${idx}"]:checked`); if(s && parseInt(s.value) === q.ans) score++; else if(!errorList.find(e => e.id === q.id)) errorList.push(q); }); localStorage.setItem('errorList', JSON.stringify(errorList)); const f = Math.round((score/currentQuestions.length)*100); document.getElementById('quizArea').style.display='none'; document.getElementById('resultArea').style.display='block'; document.getElementById('scoreDisplay').innerText = f + " 分"; document.getElementById('resultMsg').innerText = f >= 60 ? "及格了！暖心暖胃 🥳☕" : "沒及格...再去複習機制看看錯題吧！🍵"; window.scrollTo(0,0); }
    function resetExam() { document.getElementById('resultArea').style.display='none'; document.getElementById('examSetup').style.display='block'; }
    function renderErrors() { document.getElementById('errorList').innerHTML = errorList.length ? errorList.map(e => `<div class="error-item"><button class="del-btn" onclick="removeError(${e.id})">刪除</button><p><b>題：</b>${e.q}</p><p style="color:var(--success)">解答: ${e.options[e.ans]}</p></div>`).join('') : '<p style="text-align:center;color:#999;padding:20px;">暫無錯題 🍪</p>'; }
    function removeError(id) { errorList = errorList.filter(e => e.id !== id); localStorage.setItem('errorList', JSON.stringify(errorList)); renderErrors(); }
    function speak(txt) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(txt)); }
    renderVocab();
</script>
</body>
</html>
