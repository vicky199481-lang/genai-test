<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍵 GenAI 考照助手：專業進化版</title>
    <style>
        :root { 
            --primary: #C19A6B; 
            --bg: #FFFBF5; 
            --card: #ffffff; 
            --success: #A9B28B; 
            --error: #D9534F; /* 警告紅 */
            --text: #5D4037; 
            --accent: #EFEBE9;
        }

        body { font-family: -apple-system, "微軟正黑體", sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        
        /* Header */
        .app-header { background: var(--card); display: flex; align-items: center; padding: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-bottom: 2px solid var(--accent); }
        .menu-dots { background: none; border: none; color: var(--primary); font-size: 28px; cursor: pointer; padding: 0 10px; }
        
        /* Side Menu */
        .side-menu { display: none; position: absolute; top: 60px; left: 10px; background: var(--card); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 15px; width: 200px; z-index: 1001; overflow: hidden; }
        .side-menu a { display: block; padding: 15px 20px; color: var(--text); text-decoration: none; border-bottom: 1px solid var(--accent); }

        /* Sections */
        .content-section { display: none; padding: 15px; }
        .active { display: block; }
        
        /* Progress Dashboard Style */
        .progress-container { text-align: center; padding: 20px; }
        .circle-progress { width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(var(--primary) var(--p, 0%), #eee 0); display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; position: relative; }
        .circle-progress::after { content: ""; width: 100px; height: 100px; background: var(--card); border-radius: 50%; position: absolute; }
        .progress-text { position: relative; z-index: 1; font-size: 1.5em; font-weight: bold; color: var(--primary); }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: var(--accent); padding: 15px; border-radius: 15px; }

        /* Tag Style */
        .q-tag { display: inline-block; background: #FFDAB9; color: #8B4513; font-size: 0.75em; padding: 2px 8px; border-radius: 50px; margin-bottom: 8px; font-weight: bold; }

        /* Card Style */
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); position: relative; }
        
        /* Error List Red Highlight */
        .error-warning { color: var(--error); font-weight: 900; border: 2px solid var(--error); padding: 5px 10px; border-radius: 10px; display: inline-block; margin-bottom: 10px; }

        .tab-bar { display: flex; background: var(--accent); padding: 5px; border-radius: 50px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 50px; cursor: pointer; color: #888; }
        .tab-btn.active { background: var(--card); color: var(--primary); font-weight: bold; }

        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 1em; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header class="app-header">
    <button class="menu-dots" onclick="toggleMenu()">⋮</button>
    <div id="sideMenu" class="side-menu">
        <a href="javascript:void(0)" onclick="showSection('progress-section')">📊 學習進度</a>
        <a href="javascript:void(0)" onclick="showSection('vocab-section')">📜 核心觀念</a>
        <a href="javascript:void(0)" onclick="showSection('exam-section')">📝 考題寶典</a>
        <a href="javascript:void(0)" onclick="showSection('review-section')">🔄 複習機制</a>
    </div>
    <div style="flex:1; text-align:center; font-weight:bold;">GenAI 助手 ☕</div>
</header>

<section id="progress-section" class="content-section">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchProgTab(0)">目標達成率</button>
        <button class="tab-btn" onclick="switchProgTab(1)">每日刷題計數</button>
    </div>

    <div id="prog-sheet-0" class="prog-sheet active">
        <div class="card progress-container">
            <h3>總體練習進度</h3>
            <div class="circle-progress" id="progressCircle" style="--p: 0%">
                <div class="progress-text" id="progressVal">0%</div>
            </div>
            <p>已掌握題數：<span id="masteredCount">0</span> / <span id="totalCount">0</span></p>
        </div>
    </div>

    <div id="prog-sheet-1" class="prog-sheet" style="display:none;">
        <div class="card">
            <h3>今日戰績 📈</h3>
            <div class="stat-grid">
                <div class="stat-box">
                    <small>今日練習</small>
                    <div style="font-size: 1.5em; font-weight: bold;" id="todayCount">0 題</div>
                </div>
                <div class="stat-box">
                    <small>平均分數</small>
                    <div style="font-size: 1.5em; font-weight: bold;" id="avgScore">0 分</div>
                </div>
            </div>
        </div>
    </div>
</section>

<section id="exam-section" class="content-section">
    <div id="quizArea">
        <div id="questionList"></div>
        <button class="btn-main" onclick="gradeExam()">送出評分</button>
    </div>
</section>

<section id="review-section" class="content-section">
    <h3>❌ 錯題複習 (紅字警告)</h3>
    <div id="errorList"></div>
</section>

<section id="vocab-section" class="content-section">
    <div id="vocabList"></div>
</section>

<script>
    // 題庫擴充：增加標籤 (tags)
    const questionBank = [
        { id: 1, tag: "模型原理", q: "關於 AI 的「幻覺」，下列敘述何者正確？", options: ["AI 喝醉了", "AI 自信地說出錯誤資訊", "AI 拒絕回答"], ans: 1 },
        { id: 2, tag: "技術架項", q: "哪種技術能讓 AI 連結企業文件來回答問題？", options: ["RAG", "CPU", "GPU"], ans: 0 },
        { id: 3, tag: "參數調整", q: "Temperature 參數調低會讓 AI 的內容？", options: ["更嚴謹", "更有創意", "更長"], ans: 0 },
        { id: 4, tag: "法律倫理", q: "要降低風險，導入 AI 前應先做？", options: ["資料去識別化", "增加電力", "重新開機"], ans: 0 }
    ];

    let errorStats = JSON.parse(localStorage.getItem('errorStats')) || {}; // 紀錄每題錯幾次
    let dailyLog = JSON.parse(localStorage.getItem('dailyLog')) || { date: "", count: 0, totalScore: 0, times: 0 };

    function toggleMenu() { const m = document.getElementById('sideMenu'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
    
    function showSection(id) { 
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        toggleMenu();
        if(id === 'progress-section') updateProgressUI();
        if(id === 'review-section') renderErrors();
        if(id === 'exam-section') startQuiz();
    }

    // 學習進度分頁切換
    function switchProgTab(idx) {
        document.querySelectorAll('.prog-sheet').forEach(s => s.style.display = 'none');
        document.querySelectorAll('#progress-section .tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('prog-sheet-' + idx).style.display = 'block';
        document.querySelectorAll('#progress-section .tab-btn')[idx].classList.add('active');
    }

    function updateProgressUI() {
        const total = questionBank.length;
        const errorKeys = Object.keys(errorStats).length;
        const mastered = Math.max(0, total - errorKeys);
        const percent = Math.round((mastered / total) * 100);
        
        document.getElementById('progressCircle').style.setProperty('--p', percent + '%');
        document.getElementById('progressVal').innerText = percent + '%';
        document.getElementById('masteredCount').innerText = mastered;
        document.getElementById('totalCount').innerText = total;

        // 今日數據
        const today = new Date().toLocaleDateString();
        if(dailyLog.date !== today) {
            dailyLog = { date: today, count: 0, totalScore: 0, times: 0 };
        }
        document.getElementById('todayCount').innerText = dailyLog.count + " 題";
        const avg = dailyLog.times > 0 ? Math.round(dailyLog.totalScore / dailyLog.times) : 0;
        document.getElementById('avgScore').innerText = avg + " 分";
    }

    function startQuiz() {
        document.getElementById('questionList').innerHTML = questionBank.map((q, idx) => `
            <div class="card">
                <span class="q-tag"># ${q.tag}</span>
                <p><b>Q${idx+1}:</b> ${q.q}</p>
                ${q.options.map((o, oi) => `<label style="display:block; margin:10px 0;"><input type="radio" name="q${idx}" value="${oi}"> ${o}</label>`).join('')}
            </div>
        `).join('');
    }

    function gradeExam() {
        let score = 0;
        questionBank.forEach((q, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            if (selected && parseInt(selected.value) === q.ans) {
                score++;
            } else {
                // 錯題紀錄 + 累計次數
                errorStats[q.id] = (errorStats[q.id] || 0) + 1;
            }
        });

        // 儲存今日戰績
        dailyLog.count += questionBank.length;
        dailyLog.totalScore += (score / questionBank.length) * 100;
        dailyLog.times += 1;
        localStorage.setItem('dailyLog', JSON.stringify(dailyLog));
        localStorage.setItem('errorStats', JSON.stringify(errorStats));
        
        alert(`測驗結束！得分：${Math.round((score/questionBank.length)*100)}`);
        showSection('progress-section');
    }

    function renderErrors() {
        const list = document.getElementById('errorList');
        const errors = questionBank.filter(q => errorStats[q.id]);
        
        list.innerHTML = errors.length ? errors.map(q => `
            <div class="card">
                ${errorStats[q.id] >= 2 ? `<div class="error-warning">⚠️ 嚴重弱點：已錯 ${errorStats[q.id]} 次</div>` : ''}
                <p><b>[${q.tag}]</b> ${q.q}</p>
                <p style="color:var(--success); font-weight:bold;">正確答案：${q.options[q.ans]}</p>
            </div>
        `).join('') : '<p style="text-align:center; padding:20px;">目前沒有錯題，繼續保持！☕</p>';
    }

    showSection('progress-section'); // 預設進入進度頁面
</script>
</body>
</html>
