<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成式AI考照助手（封頂版🔥）</title>
<style>
body{font-family:sans-serif;background:#f5efe6;margin:0}
header{display:flex;justify-content:space-between;padding:10px;background:#d8c3a5}
button{margin:5px;padding:6px 10px;border:none;border-radius:8px;background:#8ab17d;color:#fff}
.card{background:#fff;margin:10px;padding:15px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.1)}
.hidden{display:none}
.wrong{border:2px solid red}
.correct{border:2px solid green}
.blur{filter:blur(5px)}
.badge{padding:2px 6px;border-radius:6px;background:#eee;margin-left:6px}
</style>
</head>
<body>
<header>
<div>
<button onclick="show('progress')">學習進度</button>
<button onclick="show('concept')">核心觀念</button>
<button onclick="show('quiz')">考題寶典</button>
<button onclick="show('wrong')">錯題複習</button>
</div>
<button onclick="clearAll()">清除紀錄</button>
</header>

<div id="progress" class="page">
<div class="card"><h3>完成度</h3><div id="rate"></div></div>
<div class="card"><p id="daily"></p></div>
<div class="card"><h3>弱點分析</h3><div id="weak"></div></div>
</div>

<div id="concept" class="page hidden"><div id="cards"></div></div>

<div id="quiz" class="page hidden">
<div class="card">
<select id="count"><option>5</option><option>10</option><option>20</option></select>
<select id="level">
<option value="all">全部</option>
<option value="easy">簡單</option>
<option value="mid">中等</option>
<option value="hard">困難</option>
</select>
<button onclick="startQuiz()">開始測驗</button>
</div>
<div id="quizBox"></div>
</div>

<div id="wrong" class="page hidden"><div id="wrongBox"></div></div>

<script>
// ✅ 完整資料（精簡展示，實際可無限擴充）
let words=[
{en:"Attention Head",zh:"注意力頭",desc:"平行處理資訊",level:"hard"},
{en:"Positional Encoding",zh:"位置編碼",desc:"補足順序",level:"mid"},
{en:"Prompt Leakage",zh:"提示詞洩漏",desc:"洩漏系統資訊",level:"hard"},
{en:"RAG",zh:"檢索增強生成",desc:"補充知識",level:"mid"},
{en:"Embedding",zh:"向量化",desc:"轉成數學空間",level:"easy"},
{en:"Token",zh:"標記",desc:"最小單位",level:"easy"},
{en:"Transformer",zh:"轉換器",desc:"核心架構",level:"mid"},
{en:"Hallucination",zh:"幻覺",desc:"錯誤資訊",level:"easy"}
]

// 🧠 AI出題（含難度）
function generateQuestions(){
let q=[]
words.forEach(w=>{
let opts=[w.zh]
let wrong=words.filter(x=>x.en!==w.en).sort(()=>0.5-Math.random()).slice(0,3)
wrong.forEach(x=>opts.push(x.zh))
opts=opts.sort(()=>0.5-Math.random())
q.push({q:`${w.en} 是什麼？`,options:opts,ans:opts.indexOf(w.zh),level:w.level,tag:w.en,explain:w.desc})
})
return q
}

let db={questions:generateQuestions()}
let state={wrong:JSON.parse(localStorage.getItem('wrong')||'[]'),stats:JSON.parse(localStorage.getItem('stats')||'{}')}

function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');renderAll()}

function renderCards(){
let html=''
words.forEach(w=>{
html+=`<div class='card'>${w.en}<span class='badge'>${w.level}</span><br><span class='zh'>${w.zh}</span><br>${w.desc}<br>
<button onclick="speak('${w.en}')">🔊</button>
<button onclick="this.parentElement.querySelector('.zh').classList.toggle('blur')">👁️</button></div>`
})
document.getElementById('cards').innerHTML=html
}

function speak(t){speechSynthesis.speak(new SpeechSynthesisUtterance(t))}

let current=[]
function startQuiz(){
let n=parseInt(count.value)
let level=document.getElementById('level').value
let pool=db.questions
if(level!='all') pool=pool.filter(q=>q.level==level)
current=pool.sort(()=>0.5-Math.random()).slice(0,n)
let html=''
current.forEach((q,i)=>{
html+=`<div class='card' id='q${i}'>${q.q} <span class='badge'>${q.level}</span>`
q.options.forEach((o,j)=>{html+=`<div><input type='radio' name='q${i}' value='${j}'>${o}</div>`})
html+='</div>'
})
html+=`<button onclick='submit()'>送出</button>`
document.getElementById('quizBox').innerHTML=html
}

function submit(){
let score=0
current.forEach((q,i)=>{
let sel=document.querySelector(`input[name=q${i}]:checked`)
let box=document.getElementById(`q${i}`)
if(sel && sel.value==q.ans){score++;box.classList.add('correct')}
else{box.classList.add('wrong');state.wrong.push(q);trackWeak(q.tag)}
})
localStorage.setItem('wrong',JSON.stringify(state.wrong))
localStorage.setItem('stats',JSON.stringify(state.stats))
alert('分數:'+Math.round(score/current.length*100))
renderAll()
}

function trackWeak(tag){
state.stats[tag]=(state.stats[tag]||0)+1
}

function renderWrong(){
let html=''
state.wrong.forEach((q,i)=>{html+=`<div class='card'>${q.q}<button onclick='del(${i})'>刪除</button></div>`})
document.getElementById('wrongBox').innerHTML=html
}

function del(i){state.wrong.splice(i,1);localStorage.setItem('wrong',JSON.stringify(state.wrong));renderAll()}

function renderProgress(){
let total=db.questions.length
let wrong=state.wrong.length
let rate=Math.round((1-wrong/total)*100)
document.getElementById('rate').innerText=rate+'%'

let weakHtml=''
Object.entries(state.stats).sort((a,b)=>b[1]-a[1]).slice(0,5).forEach(w=>{
weakHtml+=`<div>${w[0]}（錯${w[1]}次）</div>`
})
document.getElementById('weak').innerHTML=weakHtml
}

function renderAll(){renderCards();renderWrong();renderProgress()}
function clearAll(){localStorage.clear();location.reload()}

renderAll()
</script>
</body>
</html>
